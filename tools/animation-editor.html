<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>动画编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; color: white; padding: 30px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { background: white; padding: 30px; border-radius: 15px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
    .btn { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; }
    .anim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .anim-item { padding: 15px; background: #f0f0f0; border-radius: 8px; text-align: center; cursor: pointer; border: 3px solid transparent; }
    .anim-item:hover, .anim-item.active { border-color: #667eea; background: #667eea; color: white; }
    .preview { background: #f8f9fa; padding: 60px; text-align: center; border-radius: 10px; min-height: 200px; display: flex; align-items: center; justify-content: center; }
    .preview-box { padding: 30px 50px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 10px; font-size: 1.5rem; }
    .code-output { background: #2d3748; color: white; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>✨ 动画编辑器</h1></header>
    <div class="grid">
      <div class="panel">
        <h2>选择动画</h2>
        <div class="anim-grid">
          <div class="anim-item active" onclick="select('fadeIn',this)">淡入</div>
          <div class="anim-item" onclick="select('slideInUp',this)">上滑</div>
          <div class="anim-item" onclick="select('slideInDown',this)">下滑</div>
          <div class="anim-item" onclick="select('slideInLeft',this)">左滑</div>
          <div class="anim-item" onclick="select('slideInRight',this)">右滑</div>
          <div class="anim-item" onclick="select('scaleIn',this)">缩放</div>
          <div class="anim-item" onclick="select('bounceIn',this)">弹跳</div>
          <div class="anim-item" onclick="select('rotateIn',this)">旋转</div>
          <div class="anim-item" onclick="select('pulse',this)">脉冲</div>
        </div>
        <div class="form-group"><label>持续时间 (秒)</label><input type="range" id="duration" min="0.1" max="3" step="0.1" value="0.8" oninput="document.getElementById('dur-val').textContent=this.value"></div>
        <div style="text-align:center;color:#667eea;margin-bottom:15px;"><span id="dur-val">0.8</span>s</div>
        <div class="form-group"><label>延迟 (秒)</label><input type="range" id="delay" min="0" max="2" step="0.1" value="0" oninput="document.getElementById('del-val').textContent=this.value"></div>
        <div style="text-align:center;color:#667eea;margin-bottom:15px;"><span id="del-val">0</span>s</div>
        <button class="btn" onclick="play()">▶️ 播放</button>
        <button class="btn" onclick="copy()">📋 复制代码</button>
        <div class="code-output" id="code"></div>
      </div>
      <div class="panel">
        <h2>预览</h2>
        <div class="preview">
          <div class="preview-box" id="preview">动画效果</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let selected='fadeIn';
    function select(anim,el) {
      selected=anim;
      document.querySelectorAll('.anim-item').forEach(i=>i.classList.remove('active'));
      el.classList.add('active');
      play();
    }
    function play() {
      const box=document.getElementById('preview');
      const dur=parseFloat(document.getElementById('duration').value);
      const del=parseFloat(document.getElementById('delay').value);
      box.style.animation='none';
      box.offsetHeight;
      box.style.animation=`${selected} ${dur}s ease ${del}s forwards`;
      document.getElementById('code').textContent=`Animations.${selected}(element, {
  duration: ${dur},
  delay: ${del > 0 ? del : '0'}
});`;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('code').textContent); alert('已复制!'); }
    play();
  </script>
</body>
</html>
