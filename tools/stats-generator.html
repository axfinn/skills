<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>统计卡片生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; color: white; padding: 30px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { background: white; padding: 30px; border-radius: 15px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
    .btn { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; }
    .data-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .data-row input { flex: 1; }
    .preview { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 30px; border-radius: 15px; min-height: 300px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .stat-card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; text-align: center; backdrop-filter: blur(10px); }
    .stat-value { font-size: 2.5rem; font-weight: bold; color: #ff6b6b; margin-bottom: 10px; }
    .stat-label { color: rgba(255,255,255,0.8); font-size: 0.95rem; }
    .code-output { background: #2d3748; color: white; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>📈 统计卡片生成器</h1></header>
    <div class="grid">
      <div class="panel">
        <h2>配置</h2>
        <div class="form-group"><label>标题</label><input type="text" id="title" value="关键指标" oninput="update()"></div>
        <div class="form-group"><label>主题</label><select id="theme" onchange="update()"><option value="dark">深色</option><option value="gradient">渐变</option><option value="tech">科技</option></select></div>
        <div class="form-group"><label>数据项</label>
          <div id="data-rows">
            <div class="data-row"><input class="val" value="-15.6%" placeholder="数值"><input class="lbl" value="股市跌幅" placeholder="标签"></div>
            <div class="data-row"><input class="val" value="4.2%" placeholder="数值"><input class="lbl" value="通胀率" placeholder="标签"></div>
            <div class="data-row"><input class="val" value="2.1 万" placeholder="数值"><input class="lbl" value="新增就业" placeholder="标签"></div>
          </div>
          <button class="btn" onclick="addRow()" style="margin-top:10px;">+ 添加</button>
        </div>
        <button class="btn" onclick="update()">更新预览</button>
        <button class="btn" onclick="copy()">📋 复制代码</button>
        <div class="code-output" id="code"></div>
      </div>
      <div class="panel">
        <h2>预览</h2>
        <div class="preview" id="preview-bg">
          <h2 id="preview-title" style="color:white;text-align:center;margin-bottom:25px;">关键指标</h2>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const themes={dark:'linear-gradient(135deg, #1a1a2e, #16213e)',gradient:'linear-gradient(135deg, #667eea, #764ba2)',tech:'linear-gradient(135deg, #0f0c29, #302b63)'};
    function addRow() {
      const div=document.createElement('div');
      div.className='data-row';
      div.innerHTML='<input class="val" placeholder="数值"><input class="lbl" placeholder="标签">';
      document.getElementById('data-rows').appendChild(div);
      update();
    }
    function update() {
      document.getElementById('preview-bg').style.background=themes[document.getElementById('theme').value];
      document.getElementById('preview-title').textContent=document.getElementById('title').value;
      const grid=document.getElementById('stats-grid');
      grid.innerHTML='';
      document.querySelectorAll('.data-row').forEach(row=>{
        const val=row.querySelector('.val').value;
        const lbl=row.querySelector('.lbl').value;
        if(val&&lbl) {
          const card=document.createElement('div');
          card.className='stat-card';
          card.innerHTML=`<div class="stat-value">${val}</div><div class="stat-label">${lbl}</div>`;
          grid.appendChild(card);
        }
      });
      const stats=[];
      document.querySelectorAll('.data-row').forEach(row=>{
        const v=row.querySelector('.val').value,l=row.querySelector('.lbl').value;
        if(v&&l) stats.push(`{ value: '${v}', label: '${l}' }`);
      });
      document.getElementById('code').textContent=`Templates.statsSlide({
  title: '${document.getElementById('title').value}',
  stats: [
${stats.join(',\n')}
  ],
  theme: '${document.getElementById('theme').value}'
});`;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('code').textContent); alert('已复制!'); }
    update();
  </script>
</body>
</html>
