<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video PPT Tools - 工具箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; color: white; padding: 40px 0; }
    header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .tool-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .tool-icon { font-size: 3rem; margin-bottom: 15px; }
    .tool-card h2 { color: #667eea; font-size: 1.5rem; margin-bottom: 10px; }
    .tool-card p { color: #666; line-height: 1.6; margin-bottom: 15px; }
    .feature-tag {
      display: inline-block;
      padding: 5px 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 15px;
      font-size: 0.8rem;
      margin-right: 5px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 Video PPT Tools</h1>
      <p>可视化视频 PPT 制作工具集</p>
    </header>
    
    <div class="tools-grid">
      <a href="chart-generator.html" class="tool-card">
        <div class="tool-icon">📊</div>
        <h2>图表生成器</h2>
        <p>创建柱状图、折线图、饼图，实时预览</p>
        <div>
          <span class="feature-tag">柱状图</span>
          <span class="feature-tag">折线图</span>
          <span class="feature-tag">饼图</span>
        </div>
      </a>
      
      <a href="animation-editor.html" class="tool-card">
        <div class="tool-icon">✨</div>
        <h2>动画编辑器</h2>
        <p>12 种动画效果，可视化编辑</p>
        <div>
          <span class="feature-tag">12+ 动画</span>
          <span class="feature-tag">时间轴</span>
          <span class="feature-tag">实时预览</span>
        </div>
      </a>
      
      <a href="stats-generator.html" class="tool-card">
        <div class="tool-icon">📈</div>
        <h2>统计卡片生成器</h2>
        <p>美观的数据展示卡片</p>
        <div>
          <span class="feature-tag">4 种主题</span>
          <span class="feature-tag">自定义</span>
          <span class="feature-tag">实时预览</span>
        </div>
      </a>
      
      <a href="../preview/index.html" class="tool-card">
        <div class="tool-icon">🎨</div>
        <h2>素材库</h2>
        <p>16 个免费素材网站</p>
        <div>
          <span class="feature-tag">视频</span>
          <span class="feature-tag">图片</span>
          <span class="feature-tag">音乐</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
